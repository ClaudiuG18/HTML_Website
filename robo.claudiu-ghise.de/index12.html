<!DOCTYPE html>
<html>

<head>
  <title>Arduino Control</title>
</head>

<body>
  <script>
    const ws = new WebSocket('wss://robo.claudiu-ghise.de/ws');

    ws.onopen = () => {
      console.log('Connected to Arduino!');
      ws.send('Hello from browser');
    };

    ws.onmessage = (event) => {
      console.log('Arduino says:', event.data);
    };

    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
    };
  </script>
</body>

</html>
