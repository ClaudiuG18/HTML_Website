<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/CSS/robo.css">
  <link rel="manifest" href="manifest.json">

  <title>Robotic Arm Control</title>
</head>

<body>
  <h1>Robotic Arm Control</h1>
  <div class="main-content">
    <div class="sliders">
      <div>
        <label>Base: </label>
        <input type="range" min="0" max="270" value="60" class="slider" id="servo1">
        <span class="status" id="servo1Val">60°</span>
      </div>
      <div>
        <label>Axe A: </label>
        <input type="range" min="50" max="230" value="150" class="slider" id="servo2">
        <span class="status" id="servo2Val">150°</span>
      </div>
      <div>
        <label>Axe B: </label>
        <input type="range" min="10" max="270" value="90" class="slider" id="servo3">
        <span class="status" id="servo3Val">90°</span>
      </div>
      <div>
        <label>Axe C: </label>
        <input type="range" min="0" max="270" value="90" class="slider" id="servo4">
        <span class="status" id="servo4Val">90°</span>
      </div>
      <div>
        <label>Gripper:</label>
        <input type="range" min="85" max="175" value="90" class="slider" id="gripper">
        <span class="status" id="gripperVal">90°</span>
      </div>
      <div>
        <label>Speed:</label>
        <input type="range" min="1" max="500" value="10" class="slider" id="stepDelay">
        <span class="status" id="stepDelayVal">10ms</span>
      </div>
      <div>
        <label>Step:</label>
        <input type="range" min="1" max="10" value="3" class="slider" id="stepSize">
        <span class="status" id="stepSizeVal">3µs</span>
      </div>
    </div>
    <div class="text-btn">
      <div>
        <textarea name="code" id="textarea"
          placeholder="Enter commands here: in form&#10servo1:40;&#10servo1 -> Base&#10servo5 -> Gripper"></textarea>
      </div>
      <div class="buttons">
        <div class="buttonRun">
          <button id="run">Run</button>
        </div>
        <div class="buttonReset">
          <button id="reset">Reset</button>
        </div>
      </div>
    </div>
    <div class="loop-contr">
      <div>
        <label for="checkbox">
          <input type="checkbox" id="loop">Loop
        </label>
      </div>
      <div>
        <label for="loop-num">
          <input type="number" id="loop-num" min="0" max="999">Repeat
        </label>
      </div>
    </div>
  </div>




  <script src="/JS/robo.js"></script>
</body>

</html>
