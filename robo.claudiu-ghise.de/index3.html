<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/CSS/robo.css">
  <link rel="manifest" href="manifest.json">
  <title>Servo Control Panel</title>
</head>

<body>
  <h2>Steuerung für 4 Servos</h2>

  <div>
    <h3>Servo 1</h3>
    <label>µs:</label> <input type="number" id="us1" min="500" max="2500" value="1500">
    <label>Speed:</label> <input type="number" id="speed1" min="1" max="50" value="5">
  </div>

  <div>
    <h3>Servo 2</h3>
    <label>µs:</label> <input type="number" id="us2" min="500" max="2500" value="1500">
    <label>Speed:</label> <input type="number" id="speed2" min="1" max="50" value="5">
  </div>

  <div>
    <h3>Servo 3</h3>
    <label>µs:</label> <input type="number" id="us3" min="500" max="2500" value="1500">
    <label>Speed:</label> <input type="number" id="speed3" min="1" max="50" value="5">
  </div>

  <div>
    <h3>Servo 4</h3>
    <label>µs:</label> <input type="number" id="us4" min="500" max="2500" value="1500">
    <label>Speed:</label> <input type="number" id="speed4" min="1" max="50" value="5">
  </div>

  <br>
  <button onclick="sendCommand()">Bewege Servos</button>

  <script>
    var socket = new WebSocket("ws://" + location.host + "/ws");

    socket.onopen = function () {
      console.log("Verbunden mit ESP8266");
    };

    function sendCommand() {
      var us1 = document.getElementById("us1").value;
      var speed1 = document.getElementById("speed1").value;
      var us2 = document.getElementById("us2").value;
      var speed2 = document.getElementById("speed2").value;
      var us3 = document.getElementById("us3").value;
      var speed3 = document.getElementById("speed3").value;
      var us4 = document.getElementById("us4").value;
      var speed4 = document.getElementById("speed4").value;

      var command = `${us1},${speed1}|${us2},${speed2}|${us3},${speed3}|${us4},${speed4}`;
      socket.send(command);
      console.log("Gesendet: " + command);
    }
  </script>

  <script>if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/sw.js")
        .then((registration) => {
          console.log("Service Worker registered with scope:", registration.scope);
        })
        .catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
    } else {
      console.error("Service Worker is not supported in this browser.");
    }
  </script>
</body>

</html>
