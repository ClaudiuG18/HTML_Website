<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Heating Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js + Zoom plugin -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    :root{
      --bg:#020617; --text:#e5e7eb; --muted:#9ca3af; --card:#020617; --border:#111827;
      --ok:#22c55e; --off:#9ca3af; --bad:#ef4444; --accent:#38bdf8;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    body{margin:0; background:radial-gradient(circle at top,#0b1120 0,#020617 60%); color:var(--text); padding:20px}
    .container{max-width:1200px;margin:0 auto}
    h1{margin:0 0 6px;font-size:28px}
    .subtitle{margin:0 0 18px;color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:16px}
    @media (max-width: 900px){ .grid{grid-template-columns:1fr} }
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 16px; box-shadow:0 18px 40px rgba(15,23,42,.8)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    label{font-size:12px;color:var(--muted)}
    select,input{background:#0b1224;color:var(--text);border:1px solid #1f2a44;border-radius:10px;padding:8px 10px}
    button{background:var(--accent);border:0;border-radius:999px;padding:8px 14px;cursor:pointer;color:#020617;font-weight:600}
    button:hover{filter:brightness(1.05)}
    .status{margin-left:auto;font-size:13px;color:var(--muted)}
    .room-title{font-weight:700;margin-bottom:4px}
    .room-sub{font-size:12px;color:var(--muted);margin-bottom:8px}
    .room-status{font-size:13px;margin-top:6px}
    .room-status.on{color:var(--ok);font-weight:700}
    .room-status.off{color:var(--off)}
    .room-status.disc{color:var(--bad);font-weight:700}
    .chartWrap{position:relative;height:220px;margin-top:10px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{color:var(--muted);text-transform:uppercase;font-size:11px}
    th,td{padding:10px 8px;border-bottom:1px solid #111827;text-align:left}
    tr.offline{opacity:.45}
    code{color:#cbd5e1}
  </style>
</head>
<body>
  <div class="container">
    <h1>Heating Dashboard</h1>
    <p class="subtitle">Rooms: coridor · bucatarie · living · baie</p>

    <!-- Control -->
    <div class="card" style="margin-bottom:16px">
      <div class="row">
        <div>
          <label>Room</label><br/>
          <select id="device">
            <option value="coridor">coridor</option>
            <option value="bucatarie">bucatarie</option>
            <option value="living">living</option>
            <option value="baie">baie</option>
          </select>
        </div>

        <div>
          <label>Target (°C)</label><br/>
          <input id="targetTemp" type="number" step="0.1" value="20.0" />
        </div>

        <div>
          <label>Hysteresis (°C)</label><br/>
          <input id="hysteresis" type="number" step="0.1" value="0.5" />
        </div>

        <div>
          <label>Min ON (min)</label><br/>
          <input id="minOn" type="number" step="1" value="10" />
        </div>

        <div>
          <label>Min OFF (min)</label><br/>
          <input id="minOff" type="number" step="1" value="10" />
        </div>

        <button id="applyBtn">Apply</button>
        <div class="status" id="controlStatus">Ready</div>
      </div>
    </div>

    <!-- Room cards -->
    <div id="rooms" class="grid"></div>

    <!-- Overview table -->
    <div class="card">
      <table id="latest-table">
        <thead>
          <tr>
            <th>Device</th>
            <th>Temperature (°C)</th>
            <th>Humidity (%)</th>
            <th>Heating</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:12px;">Loading…</td></tr>
        </tbody>
      </table>
      <div style="margin-top:10px;color:var(--muted);font-size:11px">
        Source: <code>/api/overview</code> + <code>/api/history</code> · refresh every 10s
      </div>
    </div>
  </div>

  <script>
    const ROOMS = [
      { id: "coridor",   name: "Coridor" },
      { id: "bucatarie", name: "Bucatarie" },
      { id: "living",    name: "Living" },
      { id: "baie",      name: "Baie" },
    ];

    const REFRESH_MS = 10 * 1000;
    const DEVICE_TIMEOUT_MS = 90 * 1000; // offline if last data older than this

    const roomCharts = {}; // deviceId -> Chart

    function registerZoomPlugin() {
      const plugin = window["chartjs-plugin-zoom"] || window.ChartZoom;
      if (plugin && window.Chart && Chart.register) Chart.register(plugin);
    }
    registerZoomPlugin();

    async function fetchJSON(url, opts = {}) {
      const res = await fetch(url, Object.assign({}, opts, { cache: "no-cache" }));
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      return res.json();
    }

    function setControlStatus(msg, ok=true) {
      const el = document.getElementById("controlStatus");
      el.textContent = msg;
      el.style.color = ok ? "var(--muted)" : "var(--bad)";
    }

    function buildRoomCards() {
      const wrap = document.getElementById("rooms");
      wrap.innerHTML = "";
      for (const r of ROOMS) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="room-title">${r.name}</div>
          <div class="room-sub">Temperature / Humidity + Heating status</div>
          <div id="status-${r.id}" class="room-status disc">Status: DISCONNECTED</div>
          <div class="chartWrap"><canvas id="chart-${r.id}"></canvas></div>
        `;
        wrap.appendChild(card);
      }
    }

    async function loadRoomChart(deviceId) {
      const data = await fetchJSON(`/api/history?deviceId=${encodeURIComponent(deviceId)}&limit=200`);
      const labels = data.map(r => new Date(r.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hourCycle:'h23'}));
      const temps  = data.map(r => Number(r.temperature || 0));
      const hums   = data.map(r => Number(r.humidity || 0));

      const canvas = document.getElementById(`chart-${deviceId}`);
      const ctx = canvas.getContext("2d");

      if (!roomCharts[deviceId]) {
        roomCharts[deviceId] = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [
              { label: "Temp (°C)", data: temps, borderWidth: 2, tension: 0.25, pointRadius: 1, yAxisID:"yTemp" },
              { label: "Hum (%)",   data: hums,  borderWidth: 2, tension: 0.25, pointRadius: 1, yAxisID:"yHum"  },
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "nearest", intersect: false },
            scales: {
              x: { display: true },
              yTemp: { type:"linear", position:"left", title:{display:true, text:"°C"} },
              yHum:  { type:"linear", position:"right", grid:{drawOnChartArea:false}, title:{display:true, text:"%"} }
            },
            plugins: {
              zoom: {
                pan: { enabled: true, mode: "x" },
                zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: "x" }
              },
              legend: { labels: { color: "#e5e7eb" } }
            }
          }
        });
      } else {
        const ch = roomCharts[deviceId];
        ch.data.labels = labels;
        ch.data.datasets[0].data = temps;
        ch.data.datasets[1].data = hums;
        ch.update("none");
      }
    }

    async function refreshOverviewAndStatuses() {
      const tbody = document.querySelector("#latest-table tbody");
      const now = Date.now();

      const rows = await fetchJSON("/api/overview");
      tbody.innerHTML = "";

      for (const row of rows) {
        const hasData = row.createdAt != null;
        const ageMs = hasData ? (now - row.createdAt) : Infinity;
        const isOnline = hasData && ageMs < DEVICE_TIMEOUT_MS;

        // status for room card
        const statusEl = document.getElementById(`status-${row.deviceId}`);
        if (statusEl) {
          if (!isOnline) {
            statusEl.textContent = "Status: DISCONNECTED";
            statusEl.className = "room-status disc";
          } else if (row.heatingOn) {
            statusEl.textContent = "Status: Heating is ON";
            statusEl.className = "room-status on";
          } else {
            statusEl.textContent = "Status: Heating is OFF";
            statusEl.className = "room-status off";
          }
        }

        // table display
        let heatingText = "DISCONNECTED";
        let heatingStyle = "color:var(--bad);font-weight:700;";
        if (isOnline) {
          heatingText = row.heatingOn ? "ON" : "OFF";
          heatingStyle = row.heatingOn ? "color:var(--ok);font-weight:700;" : "color:var(--off);";
        }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.deviceId}</td>
          <td>${isOnline && row.temperature != null ? Number(row.temperature).toFixed(1) : "-"}</td>
          <td>${isOnline && row.humidity != null ? Number(row.humidity).toFixed(1) : "-"}</td>
          <td style="${heatingStyle}">${heatingText}</td>
          <td>${isOnline ? new Date(row.createdAt).toLocaleString([], { hourCycle:"h23" }) : "-"}</td>
        `;
        if (!isOnline) tr.classList.add("offline");
        tbody.appendChild(tr);
      }
    }

    async function loadControlToUI() {
      // dashboard sets control via POST /api/control, but we can prefill defaults by reading overview+local
      // simplest: keep UI as-is (you can extend later to also store/serve dashboard control latest)
      return;
    }

    async function applyControlFromUI() {
      try {
        const deviceId = document.getElementById("device").value;
        const targetTemp = parseFloat(document.getElementById("targetTemp").value);
        const hysteresis = parseFloat(document.getElementById("hysteresis").value);
        const minOnMin = parseInt(document.getElementById("minOn").value, 10);
        const minOffMin = parseInt(document.getElementById("minOff").value, 10);

        const payload = { deviceId, targetTemp, hysteresis, minOnMin, minOffMin };

        const res = await fetchJSON("/api/control", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok && res.ok !== true) {
          setControlStatus("Apply failed", false);
          return;
        }

        setControlStatus(`Applied ${deviceId} -> ${targetTemp.toFixed(1)}°C`, true);
      } catch (e) {
        console.error(e);
        setControlStatus("Apply failed (check auth)", false);
      }
    }

    async function refreshAll() {
      await refreshOverviewAndStatuses();
      // load charts per room (safe even if no ESP is connected)
      for (const r of ROOMS) {
        try { await loadRoomChart(r.id); } catch (e) { /* ignore if no data yet */ }
      }
    }

    document.getElementById("applyBtn").addEventListener("click", applyControlFromUI);

    document.addEventListener("DOMContentLoaded", async () => {
      buildRoomCards();
      await loadControlToUI();
      await refreshAll();
      setInterval(refreshAll, REFRESH_MS);
    });
  </script>
</body>
</html>
