<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Heating Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js + Zoom plugin -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <!-- Styles -->
  <link rel="stylesheet" href="../CSS/dashboard.css" />
</head>

<body>
  <div class="container">
    <h1>Heating Dashboard</h1>
    <p class="subtitle">Rooms: coridor · bucatarie · living · baie</p>

    <!-- Control -->
    <div class="card" style="margin-bottom:16px">
      <div class="row">
        <div>
          <label>Room</label><br />
          <select id="device">
            <option value="coridor">coridor</option>
            <option value="bucatarie">bucatarie</option>
            <option value="living">living</option>
            <option value="baie">baie</option>
          </select>
        </div>

        <div>
          <label>Target (°C)</label><br />
          <input id="targetTemp" type="number" step="0.1" value="20.0" />
        </div>

        <div>
          <label>Hysteresis (°C)</label><br />
          <input id="hysteresis" type="number" step="0.1" value="0.5" />
        </div>

        <div>
          <label>Min ON (min)</label><br />
          <input id="minOn" type="number" step="1" value="10" />
        </div>

        <div>
          <label>Min OFF (min)</label><br />
          <input id="minOff" type="number" step="1" value="10" />
        </div>

        <button id="applyBtn">Apply</button>
        <div class="status" id="controlStatus">Ready</div>
      </div>
    </div>
    <!-- Overview table -->
    <div class="card">
      <table id="latest-table">
        <thead>
          <tr>
            <th>Device</th>
            <th>Temperature (°C)</th>
            <th>Humidity (%)</th>
            <th>Heating</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5" style="text-align:center;color:var(--muted);padding:12px;">Loading…</td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top:10px;color:var(--muted);font-size:11px">
        Source: <code>/api/overview</code> + <code>/api/history</code> · refresh every 10s
      </div>
    </div>
    <!-- Room cards -->
    <div id="rooms" class="grid"></div>


  </div>
  <script src="../JS/dashboard.js"></script>
</body>

</html>
